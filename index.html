<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💦 How Cold?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💦</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>

<script src="https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js"></script>
<script src="https://unpkg.com/d3-geo@3.1.1/dist/d3-geo.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 32px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a365d;
    }
    header h1 .timestamp {
      font-weight: 400;
      color: #718096;
      font-size: 18px;
      margin-left: 4px;
      letter-spacing: -0.005em;
    }
    @media (max-width: 480px) {
      header h1 .timestamp { font-size: 14px; display: block; margin-left: 48px; margin-top: 2px; }
    }
    header p {
      font-size: 14px;
      color: #718096;
      margin-top: 4px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
      padding: 32px;
    }
    .stats {
      display: flex;
      gap: 18px;
      margin-bottom: 28px;
    }
    /* Pill-shaped "bubble" stat: tinted fill in the brand color, a soft
       colored glow for depth, and the temperature in the same hue. */
    .stat {
      flex: 1;
      padding: 22px 28px;
      border-radius: 999px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .stat.water {
      background: linear-gradient(135deg, #ebf4fc 0%, #d6e8f7 100%);
      box-shadow: 0 1px 2px rgba(49,130,206,0.12),
                  0 8px 24px -6px rgba(49,130,206,0.28),
                  inset 0 0 0 1px rgba(49,130,206,0.10);
      color: #1f5b94;
    }
    .stat.air {
      background: linear-gradient(135deg, #fdecec 0%, #f9d2d2 100%);
      box-shadow: 0 1px 2px rgba(229,62,62,0.12),
                  0 8px 24px -6px rgba(229,62,62,0.25),
                  inset 0 0 0 1px rgba(229,62,62,0.10);
      color: #9b2c2c;
    }
    .stat:hover {
      transform: translateY(-1px);
    }
    .stat.water:hover {
      box-shadow: 0 1px 2px rgba(49,130,206,0.14),
                  0 12px 28px -6px rgba(49,130,206,0.34),
                  inset 0 0 0 1px rgba(49,130,206,0.14);
    }
    .stat.air:hover {
      box-shadow: 0 1px 2px rgba(229,62,62,0.14),
                  0 12px 28px -6px rgba(229,62,62,0.30),
                  inset 0 0 0 1px rgba(229,62,62,0.14);
    }
    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: inherit;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-value span {
      font-size: 15px;
      font-weight: 500;
      opacity: 0.55;
      margin-left: 2px;
      letter-spacing: 0;
    }
    @media (max-width: 480px) {
      .stats { gap: 10px; margin-bottom: 20px; }
      .stat { padding: 14px 18px; gap: 3px; }
      .stat-value { font-size: 22px; }
      .stat-value span { font-size: 12px; }
    }
    .chart-wrapper {
      position: relative;
      height: 380px;
    }
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #a0aec0;
    }

    /* ---------- Globe card ---------- */
    .globe-card {
      display: grid;
      place-items: center;
      padding: 40px 32px;
    }
    .globe-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 24px;
      text-align: center;
    }
    .globe-loader {
      position: relative;
      width: 260px;
      height: 260px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Click-to-pause: freeze the whirl rings as well so it reads as "stopped" */
    .globe-loader.paused .ring-dash,
    .globe-loader.paused .ring-arc {
      animation-play-state: paused;
    }
    .globe-loader svg { display: block; width: 100%; height: 100%; overflow: visible; }

    .whirl { position: absolute; inset: 0; pointer-events: none; }
    .whirl svg { overflow: visible; }
    .ring-dash { animation: spinCW 30s linear infinite; transform-origin: 50% 50%; }
    .ring-arc  { animation: spinCCW 15s linear infinite, breathe 3.2s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes spinCW  { to { transform: rotate(360deg); } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }
    @keyframes breathe { 0%,100% { opacity: 0.55; } 50% { opacity: 0.95; } }

    /* On-globe labels */
    #cityLabels text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 9px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 2.5px;
      stroke-linejoin: round;
    }
    #cityLabels .temp-air   { fill: #e53e3e; }   /* air — HowCold red */
    #cityLabels .temp-water { fill: #3182ce; }   /* water — HowCold blue */
    #cityLabels .town {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.02em;
      fill: #2d3748;
      stroke: #fff;
      stroke-width: 3px;
    }
    #cityLabels line {
      stroke: #2d3748;
      stroke-width: 0.5;
      opacity: 0.5;
    }

    .globe-legend {
      margin-top: 20px;
      display: flex;
      gap: 18px;
      font-size: 11px;
      color: #718096;
      letter-spacing: 0.02em;
    }
    .globe-legend .swatch {
      display: inline-block;
      width: 20px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .globe-legend .sw-water { background: #3182ce; }
    .globe-legend .sw-air   { background: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><img src="loutre-portrait.png" alt="Loutre" style="width: 40px; height: 40px; vertical-align: middle; margin-right: 8px; border-radius: 50%;"> How Cold?<span class="timestamp" id="header-date"></span></h1>
      <p>Lachen water and air daily temperatures ☀️</p>
    </header>

    <div class="card">
      <div class="stats">
        <div class="stat water">
          <div class="stat-value" id="stat-water-latest">—</div>
        </div>
        <div class="stat air">
          <div class="stat-value" id="stat-air-latest">—</div>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>


    <!-- NEW: globe card -->
    <div class="card globe-card">
      <h2>Meanwhile, in a town<br>close to your heart ♥️</h2>
      <div class="globe-loader" role="img" aria-label="Spinning globe showing today's temperatures">
        <div class="whirl">
          <svg viewBox="0 0 200 200" aria-hidden="true">
            <g class="ring-dash">
              <circle cx="100" cy="100" r="96" fill="none" stroke="#2d3748" stroke-width="1" stroke-dasharray="2 6" opacity="0.45" />
            </g>
            <g class="ring-arc">
              <circle cx="100" cy="100" r="90" fill="none" stroke="#2d3748" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="110 330" stroke-dashoffset="0" opacity="0.75" />
              <circle cx="100" cy="100" r="90" fill="none" stroke="#2d3748" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="40 240" stroke-dashoffset="-180" opacity="0.45" />
            </g>
          </svg>
        </div>

        <svg id="globe" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <clipPath id="disc"><circle cx="100" cy="100" r="70" /></clipPath>
            <radialGradient id="shade" cx="50%" cy="50%" r="50%">
              <stop offset="60%" stop-color="#000" stop-opacity="0" />
              <stop offset="100%" stop-color="#000" stop-opacity="0.08" />
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="70" fill="#fff" stroke="#2d3748" stroke-width="1.25" />
          <g clip-path="url(#disc)">
            <g id="graticule" fill="none" stroke="#2d3748" stroke-width="0.4" opacity="0.22"></g>
            <g id="countries" fill="none" stroke="#2d3748" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"></g>
            <g id="cities" fill="#2d3748"></g>
            <circle cx="100" cy="100" r="70" fill="url(#shade)" />
          </g>
          <circle cx="100" cy="100" r="70" fill="none" stroke="#2d3748" stroke-width="1.25" />
          <g id="cityLabels"></g>
        </svg>
      </div>
      <div class="globe-legend">
        <span><span class="swatch sw-air"></span>Live air °C</span>
      </div>
    </div>

        <footer>
      🏊‍♀️ Sunday Morning Swimmers &middot; <a href="https://chat.whatsapp.com/EnH72JSFwQuGByphmu8cTi?mode=gi_t" style="color:inherit;text-decoration:underline;text-underline-offset:2px">Join our WhatsApp group</a>
    </footer>
  </div>

  <script>
    // Loads temperature data from temperatures.csv (single source of truth).
    // CSV format: dd.mm.yyyy,HH:MM,water,air — first row skipped to match
    // historical gen-rawdata.js behavior. Empty water becomes null.
    async function loadRawData() {
      const text = await fetch('temperatures.csv').then(r => r.text());
      const rows = text.trim().split('\n').slice(1).map(l => l.split(','));
      return rows.map(([day, time, water, air]) => {
        const [d, m, y] = day.split('.');
        return [
          `${y}-${m}-${d}T${time}`,
          water === '' ? null : Number(water),
          Number(air),
        ];
      });
    }

    (async () => {
      const RAW_DATA = await loadRawData();

    const dataPoints = RAW_DATA.map(([ts, water, air]) => ({ x: new Date(ts), water, air }));

    // Stats
    const temps = dataPoints.map(d => d.water);
    const lastWater = [...dataPoints].reverse().find(d => d.water != null);
    const lastAir   = [...dataPoints].reverse().find(d => d.air != null);

    const fmtDate = (d) => {
      const datePart = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long' });
      const h = d.getHours();
      const timePart = (h % 12 || 12) + (h < 12 ? 'am' : 'pm');
      return `${datePart}, ${timePart}`;
    };
    // Latest reading timestamp goes in the page title; the stat cards just show the values.
    document.getElementById('header-date').textContent = fmtDate(lastWater.x);
    document.getElementById('stat-water-latest').innerHTML = `💦 ${lastWater.water.toFixed(1)}<span>&deg;C</span>`;
    document.getElementById('stat-air-latest').innerHTML   = `💨 ${lastAir.air.toFixed(1)}<span>&deg;C</span>`;

    // Chart
    const ctx = document.getElementById('chart').getContext('2d');

    // Month ticks: first data point of each month
    const monthTickValues = Object.values(
      dataPoints.reduce((acc, d) => {
        const key = `${d.x.getFullYear()}-${d.x.getMonth()}`;
        if (!acc[key]) acc[key] = d.x.getTime();
        return acc;
      }, {})
    );
    const monthTickSet = new Set(monthTickValues);

    // Saturday ticks: every Saturday (day=6) at midnight within the data range
    const saturdayTickValues = [];
    const rangeStart = new Date(dataPoints[0].x);
    const rangeEnd   = new Date(dataPoints[dataPoints.length - 1].x);
    const sat = new Date(rangeStart); sat.setHours(0, 0, 0, 0);
    while (sat.getDay() !== 6) sat.setDate(sat.getDate() + 1);
    while (sat <= rangeEnd) {
      saturdayTickValues.push(sat.getTime());
      sat.setDate(sat.getDate() + 7);
    }

    // Use Saturday ticks only
    const allTickValues = saturdayTickValues.slice().sort((a, b) => a - b);

    const gradient = ctx.createLinearGradient(0, 0, 0, 380);
    gradient.addColorStop(0, 'rgba(49, 130, 206, 0.25)');
    gradient.addColorStop(1, 'rgba(49, 130, 206, 0.02)');

    new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'Water',
            data: dataPoints.map(d => ({ x: d.x, y: d.water })),
            borderColor: '#3182ce',
            backgroundColor: gradient,
            borderWidth: 2.5,
            pointBackgroundColor: '#3182ce',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 7,
            tension: 0.3,
            fill: true,
          },
          {
            label: 'Air',
            data: dataPoints.map(d => ({ x: d.x, y: d.air })),
            borderColor: '#e53e3e',
            backgroundColor: 'transparent',
            borderWidth: 2,
            borderDash: [5, 4],
            pointBackgroundColor: '#e53e3e',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: 'index',
          intersect: false,
        },
        plugins: {
          legend: {
            display: true,
            labels: {
              font: { size: 12, weight: '600' },
              color: '#4a5568',
              boxWidth: 20,
              boxHeight: 2,
              padding: 16,
            }
          },
          tooltip: {
            backgroundColor: '#1a365d',
            titleFont: { size: 13, weight: '600' },
            bodyFont: { size: 14, weight: '700' },
            cornerRadius: 8,
            padding: 12,
            displayColors: true,
            callbacks: {
              title: (items) => {
                const d = new Date(items[0].parsed.x);
                return d.toLocaleDateString('en-GB', {
                  weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });
              },
              label: (item) => ` ${item.dataset.label}: ${item.parsed.y.toFixed(1)} °C`,
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: {
              tooltipFormat: 'dd MMM HH:mm',
            },
            afterBuildTicks: (axis) => {
              axis.ticks = allTickValues.map(v => ({ value: v }));
            },
            grid: { display: false },
            ticks: {
              font: { size: 12, weight: '600' },
              color: '#a0aec0',
              maxRotation: 0,
              callback: (value) => new Date(value).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),
            },
            border: { display: false },
          },
          y: {
            min: Math.floor(Math.min(...dataPoints.map(d => Math.min(d.water, d.air)))) - 1,
            max: Math.ceil(Math.max(...dataPoints.map(d => Math.max(d.water, d.air)))) + 1,
            grid: {
              color: '#edf2f7',
              drawBorder: false,
            },
            ticks: {
              font: { size: 12, weight: '600' },
              color: '#a0aec0',
              callback: (val) => Math.round(val) + '°C',
              stepSize: 1,
            },
            border: { display: false },
          }
        }
      }
    });


    // ========== Globe loader ==========
    (async () => {
      const gCountries = document.getElementById('countries');
      const gGraticule = document.getElementById('graticule');
      const gCities    = document.getElementById('cities');
      const gLabels    = document.getElementById('cityLabels');

      // Cities: Lachen's air pulled live from the chart's last datapoint;
      // the others fetch their air temp from Open-Meteo. `tz` is an IANA
      // timezone used to display each city's current local time.
      const CITIES = [
        { id:'lachen',      name:'🇨🇭 Lachen',              lon:  8.85,  lat: 47.19, tz:'Europe/Zurich',       air: lastAir.air, highlight: true },
        { id:'monterey',    name:'🇺🇸 Monterey',            lon:-121.89, lat: 36.60, tz:'America/Los_Angeles' },
        { id:'cape-may',    name:'🇺🇸 Cape May',            lon:-74.92,  lat: 38.93, tz:'America/New_York' },
        { id:'bois-plage',  name:'🇫🇷 Le Bois-Plage-en-Ré', lon: -1.38,  lat: 46.18, tz:'Europe/Paris' },
        { id:'saint-malo',  name:'🇫🇷 Saint-Malo',          lon: -2.02,  lat: 48.65, tz:'Europe/Paris' },
        { id:'sassari',     name:'🇮🇹 Sassari',             lon:  8.56,  lat: 40.73, tz:'Europe/Rome' },
        { id:'moscow',      name:'🇷🇺 Moscow',              lon:  37.62, lat: 55.75, tz:'Europe/Moscow' },
        { id:'cape-town',   name:'🇿🇦 Cape Town',           lon: 18.42,  lat: -33.95, tz:'Africa/Johannesburg' },
        { id:'sydney',      name:'🇦🇺 Sydney',              lon: 151.21, lat: -33.87, tz:'Australia/Sydney' },
      ];

// Fetch live air temps for non-Lachen cities from Open-Meteo
async function fetchAirTemps(cities) {
  const targets = cities.filter(c => !c.highlight);
  if (!targets.length) return;
  const lats = targets.map(c => c.lat).join(',');
  const lons = targets.map(c => c.lon).join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('open-meteo ' + r.status);
    const j = await r.json();
    const entries = Array.isArray(j) ? j : [j];
    entries.forEach((entry, i) => {
      const t = entry?.current?.temperature_2m;
      if (typeof t === 'number') targets[i].air = Math.round(t);
    });
  } catch (e) { console.warn('Air temp fetch failed:', e); }
}
fetchAirTemps(CITIES).then(() => render());

      const projection = d3.geoOrthographic()
        .scale(70).translate([100, 100]).clipAngle(90);
      const path = d3.geoPath(projection);
      const graticule = d3.geoGraticule().step([15, 15])();

      const sources = [
        'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
        'https://unpkg.com/world-atlas@2/countries-110m.json',
      ];
      let topo = null;
      for (const url of sources) {
        try { const r = await fetch(url); if (r.ok) { topo = await r.json(); break; } } catch (e) {}
      }
      const countries = topo ? topojson.feature(topo, topo.objects.countries) : null;

      // Current local time for a city, formatted "HH:MM am/pm" (2-digit hour, lowercase).
      function fmtLocalTime(tz) {
        if (!tz) return '';
        try {
          const s = new Date().toLocaleTimeString('en-US', {
            hour: '2-digit', minute: '2-digit', hour12: true, timeZone: tz,
          });
          // toLocaleTimeString returns e.g. "03:42 PM" → lowercase
          return s.toLowerCase();
        } catch { return ''; }
      }

      // Render a city name + local time as foreignObject so flag emoji render on iOS/Safari.
      // Name and time sit on a single line (time is muted) so adjacent labels don't overlap.
      function townLabel(x, y, name, time, side) {
        const w = 175, h = 14;
        const fx = side === 1 ? x : x - w;
        const align = side === 1 ? 'left' : 'right';
        const wrapStyle = [
          'font-family:Segoe UI,-apple-system,BlinkMacSystemFont,sans-serif',
          `text-align:${align}`,
          'letter-spacing:0.02em','line-height:1',
          'white-space:nowrap',
        ].join(';');
        const nameStyle = [
          'font-size:8.5px','font-weight:700','color:#2d3748',
          'text-shadow:0 0 2.5px #fff,0 0 2.5px #fff,0 0 2.5px #fff',
        ].join(';');
        const timeStyle = [
          'font-size:7px','font-weight:500','color:#a0aec0',
          'margin-left:5px',
          'text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 2px #fff',
          'font-variant-numeric:tabular-nums',
        ].join(';');
        const timeMarkup = time ? `<span style="${timeStyle}">${time}</span>` : '';
        return `<foreignObject x="${fx.toFixed(2)}" y="${(y - 5).toFixed(2)}" width="${w}" height="${h}"><div xmlns="http://www.w3.org/1999/xhtml" style="${wrapStyle}"><span style="${nameStyle}">${name}</span>${timeMarkup}</div></foreignObject>`;
      }

      function render() {
        if (countries) {
          let d = '';
          for (const f of countries.features) { const s = path(f); if (s) d += s + ' '; }
          gCountries.innerHTML = `<path d="${d.trim()}" />`;
        }
        gGraticule.innerHTML = `<path d="${path(graticule) || ''}" />`;

        const cx = 100, cy = 100, R = 70;
        let dots = '';
        const items = [];
        for (const c of CITIES) {
          const p = projection([c.lon, c.lat]);
          if (!p) continue;
          const side = p[0] >= cx ? 1 : -1;
          const outX = cx + side * (R + 14);
          items.push({ c, p, side, outX, outY: p[1] });
        }
        // Uniform vertical gap — single-line labels (temp + name + time).
        const MIN_GAP = 14;
        for (const side of [-1, 1]) {
          const group = items.filter(i => i.side === side).sort((a,b) => a.outY - b.outY);
          for (let i = 1; i < group.length; i++) {
            if (group[i].outY - group[i-1].outY < MIN_GAP) group[i].outY = group[i-1].outY + MIN_GAP;
          }
          for (const g of group) g.outY = Math.max(14, Math.min(186, g.outY));
        }

        let labels = '';
        for (const { c, p, side, outX, outY } of items) {
          // Dot (blue for Lachen — HowCold's swim spot; slate elsewhere)
          const r = c.highlight ? 2.2 : 1.6;
          const halo = c.highlight ? 4.6 : 3.6;
          const dotColor = c.highlight ? '#3182ce' : '#2d3748';
          dots += `<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}" fill="${dotColor}" />`;
          dots += `<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${halo}" fill="none" stroke="${dotColor}" stroke-width="0.6" opacity="0.5" />`;

          // Leader line from dot to label area
          const labelPadX = side === 1 ? -2 : 2;
          labels += `<line x1="${p[0].toFixed(2)}" y1="${p[1].toFixed(2)}" x2="${(outX + labelPadX).toFixed(2)}" y2="${outY.toFixed(2)}" />`;

          const anchor = side === 1 ? 'start' : 'end';
          const tempX  = side === 1 ? outX + 1 : outX - 1;

          // Air temp + name + local time, uniform layout for all cities.
          // Lachen's air is a decimal (chart reading); others are rounded ints.
          const hasTemp  = typeof c.air === 'number';
          const airText  = hasTemp ? (c.highlight ? c.air.toFixed(1) : c.air) + '°' : '';
          const tempW    = airText.length * 4.2;
          const gap      = 3;
          const townX    = hasTemp
            ? (side === 1 ? tempX + tempW + gap : tempX - tempW - gap)
            : tempX;
          if (hasTemp) {
            labels += `<text class="temp-air" x="${tempX.toFixed(2)}" y="${(outY + 2.5).toFixed(2)}" text-anchor="${anchor}">${airText}</text>`;
          }
          labels += townLabel(townX, outY, c.name, fmtLocalTime(c.tz), side);
        }
        gCities.innerHTML = dots;
        gLabels.innerHTML = labels;
      }

      // Click the globe to pause/resume rotation (and freeze the whirl).
      // We track virtual elapsed time so the spin picks up exactly where it left
      // off rather than jumping forward by the duration of the pause.
      let running = true;
      let virtualElapsed = 0;
      let lastFrame = performance.now();

      const loaderEl = document.querySelector('.globe-loader');
      loaderEl.addEventListener('click', () => {
        running = !running;
        loaderEl.classList.toggle('paused', !running);
      });

      const LON_PERIOD_MS = 16000;
      const TILT = 18;
      function tick(now) {
        if (running) {
          virtualElapsed += now - lastFrame;
          const t = virtualElapsed / LON_PERIOD_MS;
          const lon = (t * 360) % 360;
          const wobble = Math.sin(virtualElapsed / 4200) * 4;
          projection.rotate([ -lon, -TILT + wobble, 0 ]);
          render();
        }
        lastFrame = now;
        requestAnimationFrame(tick);
      }
      render();
      requestAnimationFrame(tick);
    })();
    })();
    </script>
</body>
</html>
