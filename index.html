<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💦 How Cold?</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💦</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>

<script src="https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js"></script>
<script src="https://unpkg.com/d3-geo@3.1.1/dist/d3-geo.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 32px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 32px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    header .titles { flex: 1; min-width: 0; }
    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a365d;
    }
    header h1 .timestamp {
      font-weight: 400;
      color: #718096;
      font-size: 18px;
      margin-left: 4px;
      letter-spacing: -0.005em;
    }
    @media (max-width: 480px) {
      header h1 .timestamp { font-size: 14px; display: block; margin-left: 48px; margin-top: 2px; }
    }
    header p {
      font-size: 14px;
      color: #718096;
      margin-top: 4px;
    }
    /* Refresh button: top-right of the header.
       The icon spins while a fetch is in flight (via .loading), and we briefly
       flash a green pulse on success / red shake on failure. */
    .refresh-btn {
      flex: 0 0 auto;
      appearance: none;
      border: none;
      background: #fff;
      color: #1f5b94;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      box-shadow: 0 1px 2px rgba(49,130,206,0.10),
                  0 4px 12px -4px rgba(49,130,206,0.22),
                  inset 0 0 0 1px rgba(49,130,206,0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .refresh-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #ebf4fc 0%, #d6e8f7 100%);
      box-shadow: 0 1px 2px rgba(49,130,206,0.14),
                  0 8px 18px -4px rgba(49,130,206,0.30),
                  inset 0 0 0 1px rgba(49,130,206,0.24);
    }
    .refresh-btn:active { transform: translateY(0); }
    .refresh-btn:disabled { cursor: progress; opacity: 0.85; }
    .refresh-btn svg { width: 18px; height: 18px; display: block; }
    .refresh-btn.loading svg { animation: refreshSpin 0.9s linear infinite; }
    .refresh-btn.success {
      color: #2f855a;
      box-shadow: 0 1px 2px rgba(47,133,90,0.12),
                  0 6px 16px -4px rgba(47,133,90,0.28),
                  inset 0 0 0 1px rgba(47,133,90,0.22);
    }
    .refresh-btn.error {
      color: #9b2c2c;
      box-shadow: 0 1px 2px rgba(229,62,62,0.12),
                  0 6px 16px -4px rgba(229,62,62,0.28),
                  inset 0 0 0 1px rgba(229,62,62,0.22);
      animation: refreshShake 0.45s ease;
    }
    @keyframes refreshSpin { to { transform: rotate(-360deg); } }
    @keyframes refreshShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }
    @media (max-width: 480px) {
      .refresh-btn { width: 36px; height: 36px; }
      .refresh-btn svg { width: 16px; height: 16px; }
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
      padding: 32px;
    }
    .stats {
      display: flex;
      gap: 18px;
      margin-bottom: 28px;
    }
    /* Pill-shaped "bubble" stat: tinted fill in the brand color, a soft
       colored glow for depth, and the temperature in the same hue. */
    .stat {
      flex: 1;
      padding: 22px 28px;
      border-radius: 999px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .stat.water {
      background: linear-gradient(135deg, #ebf4fc 0%, #d6e8f7 100%);
      box-shadow: 0 1px 2px rgba(49,130,206,0.12),
                  0 8px 24px -6px rgba(49,130,206,0.28),
                  inset 0 0 0 1px rgba(49,130,206,0.10);
      color: #1f5b94;
    }
    .stat.air {
      background: linear-gradient(135deg, #fdecec 0%, #f9d2d2 100%);
      box-shadow: 0 1px 2px rgba(229,62,62,0.12),
                  0 8px 24px -6px rgba(229,62,62,0.25),
                  inset 0 0 0 1px rgba(229,62,62,0.10);
      color: #9b2c2c;
    }
    .stat:hover {
      transform: translateY(-1px);
    }
    .stat.water:hover {
      box-shadow: 0 1px 2px rgba(49,130,206,0.14),
                  0 12px 28px -6px rgba(49,130,206,0.34),
                  inset 0 0 0 1px rgba(49,130,206,0.14);
    }
    .stat.air:hover {
      box-shadow: 0 1px 2px rgba(229,62,62,0.14),
                  0 12px 28px -6px rgba(229,62,62,0.30),
                  inset 0 0 0 1px rgba(229,62,62,0.14);
    }
    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: inherit;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-value span {
      font-size: 15px;
      font-weight: 500;
      opacity: 0.55;
      margin-left: 2px;
      letter-spacing: 0;
    }
    @media (max-width: 480px) {
      .stats { gap: 10px; margin-bottom: 20px; }
      .stat { padding: 14px 18px; gap: 3px; }
      .stat-value { font-size: 22px; }
      .stat-value span { font-size: 12px; }
    }
    .chart-wrapper {
      position: relative;
      height: 380px;
    }
    /* Range toggle pills above the chart */
    .range-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 14px;
    }
    .range-toggle button {
      appearance: none;
      border: none;
      background: #edf2f7;
      color: #718096;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }
    .range-toggle button:hover { background: #e2e8f0; color: #4a5568; }
    .range-toggle button.active {
      background: linear-gradient(135deg, #ebf4fc 0%, #d6e8f7 100%);
      color: #1f5b94;
      box-shadow: 0 1px 2px rgba(49,130,206,0.10),
                  inset 0 0 0 1px rgba(49,130,206,0.10);
    }
    .range-toggle button.active:hover { background: linear-gradient(135deg, #ebf4fc 0%, #d6e8f7 100%); }
    /* ---------- 7-day forecast card ---------- */
    .forecast-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 20px;
      text-align: center;
    }
    .forecast {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .forecast-day {
      background: #f7fafc;
      border-radius: 16px;
      padding: 14px 6px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: transform 0.18s ease;
    }
    .forecast-day:hover { transform: translateY(-1px); }
    /* First day = today: tinted red bubble to match the air-temp accent */
    .forecast-day.today {
      background: linear-gradient(135deg, #fdecec 0%, #f9d2d2 100%);
      box-shadow: 0 1px 2px rgba(229,62,62,0.10),
                  0 6px 16px -6px rgba(229,62,62,0.22),
                  inset 0 0 0 1px rgba(229,62,62,0.10);
    }
    .forecast-name {
      font-size: 11px;
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .forecast-day.today .forecast-name { color: #9b2c2c; }
    .forecast-date {
      font-size: 10px;
      font-weight: 500;
      color: #a0aec0;
      margin-bottom: 2px;
    }
    .forecast-icon {
      font-size: 26px;
      margin: 4px 0 2px;
      line-height: 1;
    }
    .forecast-max {
      font-size: 16px;
      font-weight: 700;
      color: #e53e3e;
      font-variant-numeric: tabular-nums;
    }
    .forecast-min {
      font-size: 12px;
      font-weight: 500;
      color: #718096;
      font-variant-numeric: tabular-nums;
    }
    .forecast-placeholder {
      grid-column: 1 / -1;
      padding: 32px 0;
      text-align: center;
      color: #a0aec0;
      font-size: 12px;
    }
    @media (max-width: 480px) {
      .forecast { gap: 4px; }
      .forecast-day { padding: 10px 2px 8px; border-radius: 10px; }
      .forecast-name { font-size: 9px; letter-spacing: 0.03em; }
      .forecast-date { font-size: 8.5px; }
      .forecast-icon { font-size: 20px; }
      .forecast-max { font-size: 14px; }
      .forecast-min { font-size: 10.5px; }
    }
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #a0aec0;
    }

    /* ---------- Globe card ---------- */
    .globe-card {
      display: grid;
      place-items: center;
      padding: 40px 32px;
    }
    .globe-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 24px;
      text-align: center;
    }
    .globe-loader {
      position: relative;
      width: 260px;
      height: 260px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Click-to-pause: freeze the whirl rings as well so it reads as "stopped" */
    .globe-loader.paused .ring-dash,
    .globe-loader.paused .ring-arc {
      animation-play-state: paused;
    }
    .globe-loader svg { display: block; width: 100%; height: 100%; overflow: visible; }

    .whirl { position: absolute; inset: 0; pointer-events: none; }
    .whirl svg { overflow: visible; }
    .ring-dash { animation: spinCW 30s linear infinite; transform-origin: 50% 50%; }
    .ring-arc  { animation: spinCCW 15s linear infinite, breathe 3.2s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes spinCW  { to { transform: rotate(360deg); } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }
    @keyframes breathe { 0%,100% { opacity: 0.55; } 50% { opacity: 0.95; } }

    /* On-globe labels */
    #cityLabels text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 9px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 2.5px;
      stroke-linejoin: round;
    }
    #cityLabels .temp-air   { fill: #e53e3e; }   /* air — HowCold red */
    #cityLabels .temp-water { fill: #3182ce; }   /* water — HowCold blue */
    #cityLabels .town {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.02em;
      fill: #2d3748;
      stroke: #fff;
      stroke-width: 3px;
    }
    #cityLabels line {
      stroke: #2d3748;
      stroke-width: 0.5;
      opacity: 0.5;
    }

    .globe-legend {
      margin-top: 20px;
      display: flex;
      gap: 18px;
      font-size: 11px;
      color: #718096;
      letter-spacing: 0.02em;
    }
    .globe-legend .swatch {
      display: inline-block;
      width: 20px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .globe-legend .sw-water { background: #3182ce; }
    .globe-legend .sw-air   { background: #e53e3e; }

    /* ---------- Fun fact card ---------- */
    .fact-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 14px;
    }
    .fact-card h2 .fact-city {
      color: #1f5b94;
      text-transform: none;
      letter-spacing: 0;
      font-size: 16px;
      font-weight: 700;
      margin-left: 4px;
    }
    .fact-card p {
      font-size: 15px;
      line-height: 1.55;
      color: #2d3748;
    }
    .fact-card .fact-hint {
      margin-top: 14px;
      font-size: 11px;
      color: #a0aec0;
      letter-spacing: 0.02em;
    }

    /* Clickable city labels on the globe */
    #cityLabels .city-hit {
      cursor: pointer;
    }
    #cityLabels .city-hit:hover .city-name {
      color: #1f5b94 !important;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="titles">
        <h1><img src="loutre-portrait.png" alt="Loutre" style="width: 40px; height: 40px; vertical-align: middle; margin-right: 8px; border-radius: 50%;"> How Cold?<span class="timestamp" id="header-date"></span></h1>
        <p id="tagline">Lachen water and air daily temperatures ☀️</p>
      </div>
      <button type="button" class="refresh-btn" id="refresh-btn" title="Fetch the latest water &amp; air temperature for Lachen" aria-label="Refresh Lachen temperatures">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-3.05-6.77" />
          <polyline points="21 4 21 10 15 10" />
        </svg>
      </button>
    </header>

    <div class="card">
      <div class="stats">
        <div class="stat water">
          <div class="stat-value" id="stat-water-latest">—</div>
        </div>
        <div class="stat air">
          <div class="stat-value" id="stat-air-latest">—</div>
        </div>
      </div>
      <div class="range-toggle" id="range-toggle">
        <button type="button" data-range="recent" class="active">Past 2 months</button>
        <button type="button" data-range="full">Full 2026</button>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- 7-day forecast card -->
    <div class="card forecast-card">
      <h2>7-day forecast — Lachen ⛰️</h2>
      <div class="forecast" id="forecast">
        <div class="forecast-placeholder">Loading forecast…</div>
      </div>
    </div>


    <!-- NEW: globe card -->
    <div class="card globe-card">
      <h2>Meanwhile, in a town<br>close to your heart ♥️</h2>
      <div class="globe-loader" role="img" aria-label="Spinning globe showing today's temperatures">
        <div class="whirl">
          <svg viewBox="0 0 200 200" aria-hidden="true">
            <g class="ring-dash">
              <circle cx="100" cy="100" r="96" fill="none" stroke="#2d3748" stroke-width="1" stroke-dasharray="2 6" opacity="0.45" />
            </g>
            <g class="ring-arc">
              <circle cx="100" cy="100" r="90" fill="none" stroke="#2d3748" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="110 330" stroke-dashoffset="0" opacity="0.75" />
              <circle cx="100" cy="100" r="90" fill="none" stroke="#2d3748" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="40 240" stroke-dashoffset="-180" opacity="0.45" />
            </g>
          </svg>
        </div>

        <svg id="globe" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <clipPath id="disc"><circle cx="100" cy="100" r="70" /></clipPath>
            <radialGradient id="shade" cx="50%" cy="50%" r="50%">
              <stop offset="60%" stop-color="#000" stop-opacity="0" />
              <stop offset="100%" stop-color="#000" stop-opacity="0.08" />
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="70" fill="#fff" stroke="#2d3748" stroke-width="1.25" />
          <g clip-path="url(#disc)">
            <g id="graticule" fill="none" stroke="#2d3748" stroke-width="0.4" opacity="0.22"></g>
            <g id="countries" fill="none" stroke="#2d3748" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"></g>
            <g id="cities" fill="#2d3748"></g>
            <circle cx="100" cy="100" r="70" fill="url(#shade)" />
          </g>
          <circle cx="100" cy="100" r="70" fill="none" stroke="#2d3748" stroke-width="1.25" />
          <g id="cityLabels"></g>
        </svg>
      </div>
      <div class="globe-legend">
        <span><span class="swatch sw-air"></span>Live air °C</span>
      </div>
    </div>

    <!-- Fun fact card -->
    <div class="card fact-card">
      <h2>Fun Fact:<span class="fact-city" id="fact-city"></span></h2>
      <p id="fact-text"></p>
      <div class="fact-hint">↑ Click a city name on the globe to swap the fact.</div>
    </div>

        <footer>
      🏊‍♀️ Sunday Morning Swimmers &middot; <a href="https://chat.whatsapp.com/EnH72JSFwQuGByphmu8cTi?mode=gi_t" style="color:inherit;text-decoration:underline;text-underline-offset:2px">Join our WhatsApp group</a>
    </footer>
  </div>

  <script>
    // Loads temperature data from temperatures.csv (single source of truth).
    // CSV format: dd.mm.yyyy,HH:MM,water,air — first row skipped to match
    // historical gen-rawdata.js behavior. Empty water becomes null.
    async function loadRawData() {
      const text = await fetch('temperatures.csv').then(r => r.text());
      const rows = text.trim().split('\n').slice(1).map(l => l.split(','));
      return rows.map(([day, time, water, air]) => {
        const [d, m, y] = day.split('.');
        return [
          `${y}-${m}-${d}T${time}`,
          water === '' ? null : Number(water),
          Number(air),
        ];
      });
    }

    (async () => {
      const RAW_DATA = await loadRawData();

    const dataPoints = RAW_DATA.map(([ts, water, air]) => ({ x: new Date(ts), water, air }));

    // Stats
    const temps = dataPoints.map(d => d.water);
    const lastWater = [...dataPoints].reverse().find(d => d.water != null);
    const lastAir   = [...dataPoints].reverse().find(d => d.air != null);

    const fmtDate = (d) => {
      const datePart = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long' });
      const h = d.getHours();
      const timePart = (h % 12 || 12) + (h < 12 ? 'am' : 'pm');
      return `Lachen, ${datePart}, ${timePart}`;
    };
    // Latest reading timestamp goes in the page title; the stat cards just show the values.
    document.getElementById('header-date').textContent = fmtDate(lastWater.x);
    document.getElementById('stat-water-latest').innerHTML = `💦 ${lastWater.water.toFixed(1)}<span>&deg;C</span>`;
    document.getElementById('stat-air-latest').innerHTML   = `💨 ${lastAir.air.toFixed(1)}<span>&deg;C</span>`;

    // Tagline: a random word of wisdom / fortune for the Sunday Morning Swimmers.
    // Picked once per page load — refresh the page to get a new one.
    const TAGLINES = [
      'Cold water makes warm friends. 🤝',
      'The lake is always honest. 🌊',
      'A swim a day keeps existential dread away. 🧘',
      'Today, be the otter you wish to see in the world. 🦦',
      'Brave the cold; deserve the coffee. ☕',
      'Some days you swim, some days you just float. 🛟',
      'Lake first, opinions later. 🤐',
      'Goosebumps are applause from your skin. 👏',
      'Better to shiver with friends than shiver alone. 🥶',
      'The first plunge is the worst — and the best. 💥',
      'Water remembers nothing. Be like water. 💧',
      'If in doubt, jump in. 🤿',
      'Today\'s forecast: 100% chance of bragging rights. 📣',
      'Swimmers don\'t have bad moods, just bad layers. 🧥',
      'Cold lake, warm heart. ❤️',
      'An otter never checks the thermometer. 🦦',
      'Splash today, smile tomorrow. 😊',
      'Steam from the thermos is a love language. ☕',
      'Don\'t trust a calm lake. Don\'t fear a choppy one. 🌬️',
      'Every Sunday is a small adventure. 🗺️',
      'The bravest thing you\'ll do today is the first three steps in. 🚶',
      'Towels dry. Memories don\'t. 📷',
      'You came for the swim; you stayed for the people. 👯',
      'No bad swims. Only good stories. 📖',
      'The fish are watching. Impress them. 🐟',
      'Discomfort is just adventure that hasn\'t finished. 🧭',
      'You can\'t step in the same lake twice. ♾️',
      'Layers are a state of mind. 🧅',
      'The lake doesn\'t care if you slept badly. 😴',
      'Faint heart never warmed a swimmer. 💪',
      'Today\'s motto: in, then out, then cake. 🍰',
      'You will be cold. You will be glad. ✨',
    ];
    document.getElementById('tagline').textContent =
      TAGLINES[Math.floor(Math.random() * TAGLINES.length)];

    // Chart
    const ctx = document.getElementById('chart').getContext('2d');

    // Month ticks: first data point of each month
    const monthTickValues = Object.values(
      dataPoints.reduce((acc, d) => {
        const key = `${d.x.getFullYear()}-${d.x.getMonth()}`;
        if (!acc[key]) acc[key] = d.x.getTime();
        return acc;
      }, {})
    );
    const monthTickSet = new Set(monthTickValues);

    // Saturday ticks: every Saturday (day=6) at midnight within the data range
    const saturdayTickValues = [];
    const rangeStart = new Date(dataPoints[0].x);
    const rangeEnd   = new Date(dataPoints[dataPoints.length - 1].x);

    function weatherEmoji(code) {
      // WMO weather interpretation codes, collapsed to a small icon set.
      if (code === 0) return '☀️';                  // clear sky
      if (code === 1) return '🌤️';                 // mainly clear
      if (code === 2) return '⛅';                   // partly cloudy
      if (code === 3) return '☁️';                  // overcast
      if (code <= 48) return '🌫️';                 // fog
      if (code <= 57) return '🌦️';                 // drizzle
      if (code <= 67) return '🌧️';                 // rain
      if (code <= 77) return '❄️';                  // snow
      if (code <= 82) return '🌧️';                 // rain showers
      if (code <= 86) return '❄️';                  // snow showers
      return '⛈️';                                // thunderstorm
    }

    async function fetchLachenWater() {
      const target = 'https://www.badi-info.ch/_temp/zuerichsee-lachen.htm';
      const proxies = [
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(target),
        'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(target),
      ];
      let lastErr;
      for (const url of proxies) {
        try {
          const r = await fetch(url);
          if (!r.ok) throw new Error('proxy ' + r.status);
          const html = await r.text();
          const tempMatch = html.match(/<b id="t\d+">([0-9.]+)<\/b>/);
          if (!tempMatch) throw new Error('temp not found');
          return Number(tempMatch[1]);
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('all proxies failed');
    }

    async function fetchLachenAir() {

      const r = await fetch(url);
      if (!r.ok) throw new Error('open-meteo ' + r.status);
      const j = await r.json();
      const t = j?.current?.temperature_2m;
      if (typeof t !== 'number') throw new Error('air temp missing');
      return t;
    }

async function fetchAirTemps(cities) {
  const targets = cities.slice();
  if (!targets.length) return;
  const lats = targets.map(c => c.lat).join(',');
  const lons = targets.map(c => c.lon).join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('open-meteo ' + r.status);
    const j = await r.json();
    const entries = Array.isArray(j) ? j : [j];
    entries.forEach((entry, i) => {
      const t = entry?.current?.temperature_2m;
      // Lachen keeps a decimal (matches the stat-pill style); others round to int.
      if (typeof t === 'number') targets[i].air = Math.round(t);
    });
  } catch (e) { console.warn('Air temp fetch failed:', e); }

      const projection = d3.geoOrthographic()

      function townLabel(x, y, airText, name, time, side, cityId) {

          'font-size:9px','font-weight:700','color:#e53e3e',
          'text-shadow:0 0 2.5px #fff,0 0 2.5px #fff,0 0 2.5px #fff',
          'font-variant-numeric:tabular-nums',
        ].join(';');
        const nameStyle = [
          'font-size:8.5px','font-weight:700','color:#2d3748',
          'text-shadow:0 0 2.5px #fff,0 0 2.5px #fff,0 0 2.5px #fff',

        const tempMarkup = airText ? `<span style="${tempStyle}">${airText}</span>` : '';
        const nameMarkup = `<span class="city-name" style="${nameStyle};margin-left:${airText && side === 1 ? 4 : 0}px">${name}</span>`;
        const timeMarkup = time ? `<span style="${timeStyle};margin-left:5px">${time}</span>` : '';
        // Temp sits closest to the globe: right side → temp first; left side → temp last.
        const inner = side === 1

          const hasTemp  = typeof c.air === 'number';
          const airText  = hasTemp ? Math.round(c.air) + '°' : '';
          labels += townLabel(tempX, outY, airText, c.name, fmtLocalTime(c.tz), side, c.id);
        }
        gCities.innerHTML = dots;
        gLabels.innerHTML = labels;
      }

      // Click the globe to pause/resume rotation (and freeze the whirl).
      // We track virtual elapsed time so the spin picks up exactly where it left
      // off rather than jumping forward by the duration of the pause.
      let running = true;
      let virtualElapsed = 0;
      let lastFrame = performance.now();

      const loaderEl = document.querySelector('.globe-loader');
      loaderEl.addEventListener('click', () => {
        running = !running;
        loaderEl.classList.toggle('paused', !running);
      });

      // City labels are clickable: swap the fun fact below the globe.
      // We listen to `pointerdown` (not `click`) because the globe re-renders
      // every frame while spinning — by the time the browser would fire a
      // synthetic click, the original target node has been replaced and the
      // click is suppressed. pointerdown fires on the live target immediately.
      gLabels.addEventListener('pointerdown', (e) => {
        const hit = e.target.closest('[data-city-id]');
        if (!hit) return;
        e.stopPropagation();
        showFact(hit.getAttribute('data-city-id'));
      });
      // Also swallow the subsequent `click` so it doesn't bubble up to the
      // globe-loader pause toggle (when the click does manage to fire).
      gLabels.addEventListener('click', (e) => {
        if (e.target.closest('[data-city-id]')) e.stopPropagation();
      });

      const LON_PERIOD_MS = 32000;
      const TILT = 18;
      function tick(now) {
        if (running) {
          virtualElapsed += now - lastFrame;
          const t = virtualElapsed / LON_PERIOD_MS;
          const lon = (t * 360) % 360;
          const wobble = Math.sin(virtualElapsed / 4200) * 4;
          projection.rotate([ -lon, -TILT + wobble, 0 ]);
          render();
        }
        lastFrame = now;
        requestAnimationFrame(tick);
      }
      render();
      requestAnimationFrame(tick);
    })();
    })();
    </script>
</body>
</html>
