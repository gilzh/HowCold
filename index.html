<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌊 How Cold?</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 32px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a365d;
    }
    header p {
      font-size: 14px;
      color: #718096;
      margin-top: 4px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
      padding: 32px;
    }
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }
    .stat {
      flex: 1;
      padding: 16px 20px;
      background: #f7fafc;
      border-radius: 8px;
      border-left: 4px solid;
    }
    .stat.current { border-color: #3182ce; }
    .stat.avg5d   { border-color: #805ad5; }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a0aec0;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d3748;
    }
    .stat-value span {
      font-size: 16px;
      font-weight: 400;
      color: #a0aec0;
    }
    .stat-secondary {
      font-size: 16px;
      font-weight: 600;
      color: #a0aec0;
      margin-top: 2px;
    }
    .stat-secondary span {
      font-size: 13px;
      font-weight: 400;
    }
    .chart-wrapper {
      position: relative;
      height: 380px;
    }
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><img src="loutre-portrait.png" alt="Loutre" style="width: 40px; height: 40px; vertical-align: middle; margin-right: 8px; border-radius: 50%;"> How Cold?</h1>
      <p>Lachen water temperatures, daily ☀️</p>
    </header>

    <div class="card">
      <div class="stats">
        <div class="stat current">
          <div class="stat-label" id="label-current">Latest</div>
          <div class="stat-value" id="stat-current">—</div>
          <div class="stat-secondary" id="stat-current-air">—</div>
        </div>
        <div class="stat avg5d">
          <div class="stat-label">5-Day Average</div>
          <div class="stat-value" id="stat-avg5d">—</div>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <footer>
      Source: badi-info.ch &middot; Pour les Sunday Morning Swimmers 🏊‍♀️
    </footer>
  </div>

  <script>
    // Format: [ISO timestamp, water temp °C, air temp °C]
    // Measured readings use actual timestamps; model-filled days use 09:00.
    // Data from temperatures.csv + EAWAG Alplakes model (delft3d-flow/zurich, 0.5m depth)
    const RAW_DATA = [
      ["2026-02-16T12:00", 4.4, 4.6],
      ["2026-02-17T06:00", 4.4, 3.0],
      ["2026-02-18T11:15", 4.4, 4.2],
      ["2026-02-19T09:00", 4.3, 3.3],
      ["2026-02-20T00:00", 4.4, 4.3],
      ["2026-02-21T09:00", 4.3, 4.8],
      ["2026-02-22T06:50", 4.3, 1.4],
      ["2026-02-23T12:00", 4.6, 10.9],
      ["2026-02-24T09:00", 4.9, 8.7],
      ["2026-02-25T09:00", 4.7, 4.1],
      ["2026-02-26T21:00", 5.4, 9.2],
      ["2026-02-27T06:01", 5.3, 7.6],
      ["2026-02-28T09:00", 5.6, 6.2],
      ["2026-03-01T09:00", 5.7, 7.1],
      ["2026-03-02T09:00", 5.8, 2.8],
      ["2026-03-03T09:00", 5.9, 4.1],
      ["2026-03-04T19:15", 6.5, 9.7],
      ["2026-03-05T21:00", 6.7, 8.3],
      ["2026-03-06T11:05", 6.9, 10.6],
      ["2026-03-07T19:00", 7.5, 12.9],
      ["2026-03-08T23:00", 7.8, 6.7],
      ["2026-03-09T11:00", 7.6, 11.7],
      ["2026-03-10T09:00", 8.0, 6.4],
      ["2026-03-11T09:00", 8.3, 7.0],
      ["2026-03-12T09:00", 8.4, 7.1],
      ["2026-03-13T09:00", 8.1, 3.9],
      ["2026-03-14T09:00", 8.5, 7.9],
      ["2026-03-15T09:00", 7.7, 1.5],
      ["2026-03-16T09:00", 7.4, 3.2],
      ["2026-03-17T09:00", 7.4, 3.3],
      ["2026-03-18T09:00", 7.6, 3.1],
      ["2026-03-19T09:00", 7.3, 3.8],
      ["2026-03-20T09:00", 7.6, 3.4],
      ["2026-03-21T09:00", 8.0, 4.8],
      ["2026-03-22T09:00", 8.1, 5.0],
      ["2026-03-23T09:00", 8.4, 6.0],
      ["2026-03-24T09:00", 8.5, 5.3],
      ["2026-03-25T09:00", 8.9, 7.3],
      ["2026-03-26T09:00", 7.8, 1.6],
      ["2026-03-27T09:00", 7.0, 0.1],
      ["2026-03-28T09:00", 7.0, 0.2],
      ["2026-03-29T09:00", 6.9, 2.3],
      ["2026-03-30T09:00", 7.1, 3.7],
      ["2026-03-31T09:00", 6.9, 2.0],
      ["2026-04-01T09:00", 6.8, 2.3],
      ["2026-04-02T09:00", 6.9, 2.4],
      ["2026-04-03T09:00", 7.3, 5.8],
      ["2026-04-04T09:00", 8.2, 8.6],
      ["2026-04-05T09:00", 8.2, 11.3],
      ["2026-04-06T09:00", 9.2, 11.1],
      ["2026-04-07T09:00", 10.2, 11.9],
      ["2026-04-08T09:00", 10.9, 12.2],
      ["2026-04-09T09:00", 11.5, 11.9],
      ["2026-04-10T18:02", 12.4, 12.3],
      ["2026-04-11T00:37", 12.1, 9.4],
      ["2026-04-11T07:43", 11.9, 7.0],
      ["2026-04-11T07:51", 11.9, 7.0],
      ["2026-04-12T07:04", 12.4, 11.0],
    ];

    const dataPoints = RAW_DATA.map(([ts, water, air]) => ({ x: new Date(ts), water, air }));

    // Stats
    const temps = dataPoints.map(d => d.water);
    const lastWater = [...dataPoints].reverse().find(d => d.water != null);
    const lastAir   = [...dataPoints].reverse().find(d => d.air != null);
    const cutoff = new Date(dataPoints[dataPoints.length - 1].x);
    cutoff.setDate(cutoff.getDate() - 5);
    const recent = dataPoints.filter(d => d.x >= cutoff).map(d => d.water);
    const avg5d = recent.reduce((a, b) => a + b, 0) / recent.length;

    const fmtDate = (d) => d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
      + ' ' + String(d.getHours()).padStart(2, '0') + 'h';
    const waterLabel = fmtDate(lastWater.x);
    const airLabel   = fmtDate(lastAir.x);
    const sameTime   = waterLabel === airLabel;
    document.getElementById('label-current').textContent = sameTime
      ? `Latest · ${waterLabel}`
      : 'Latest';
    document.getElementById('stat-current').innerHTML =
      `🌊 ${lastWater.water.toFixed(1)}<span>&deg;C</span>`
      + (sameTime ? '' : `<span style="font-size:11px;font-weight:400;display:block;color:#a0aec0">${waterLabel}</span>`);
    document.getElementById('stat-current-air').innerHTML =
      `🌡 ${lastAir.air.toFixed(1)}<span>&deg;C</span>`
      + (sameTime ? '' : `<span style="font-size:11px;font-weight:400;display:block;color:#a0aec0">${airLabel}</span>`);
    document.getElementById('stat-avg5d').innerHTML = `${avg5d.toFixed(1)}<span>&deg;C</span>`;

    // Chart
    const ctx = document.getElementById('chart').getContext('2d');

    // One tick per month, at the timestamp of the first data point in that month
    const monthTickValues = Object.values(
      dataPoints.reduce((acc, d) => {
        const key = `${d.x.getFullYear()}-${d.x.getMonth()}`;
        if (!acc[key]) acc[key] = d.x.getTime();
        return acc;
      }, {})
    );

    const gradient = ctx.createLinearGradient(0, 0, 0, 380);
    gradient.addColorStop(0, 'rgba(49, 130, 206, 0.25)');
    gradient.addColorStop(1, 'rgba(49, 130, 206, 0.02)');

    new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          {
            label: 'Water',
            data: dataPoints.map(d => ({ x: d.x, y: d.water })),
            borderColor: '#3182ce',
            backgroundColor: gradient,
            borderWidth: 2.5,
            pointBackgroundColor: '#3182ce',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 7,
            tension: 0.3,
            fill: true,
          },
          {
            label: 'Air',
            data: dataPoints.map(d => ({ x: d.x, y: d.air })),
            borderColor: '#e53e3e',
            backgroundColor: 'transparent',
            borderWidth: 2,
            borderDash: [5, 4],
            pointBackgroundColor: '#e53e3e',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 3,
            pointHoverRadius: 6,
            tension: 0.3,
            fill: false,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: 'index',
          intersect: false,
        },
        plugins: {
          legend: {
            display: true,
            labels: {
              font: { size: 12, weight: '600' },
              color: '#4a5568',
              boxWidth: 20,
              boxHeight: 2,
              padding: 16,
            }
          },
          tooltip: {
            backgroundColor: '#1a365d',
            titleFont: { size: 13, weight: '600' },
            bodyFont: { size: 14, weight: '700' },
            cornerRadius: 8,
            padding: 12,
            displayColors: true,
            callbacks: {
              title: (items) => {
                const d = new Date(items[0].parsed.x);
                return d.toLocaleDateString('en-GB', {
                  weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });
              },
              label: (item) => ` ${item.dataset.label}: ${item.parsed.y.toFixed(1)} °C`,
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: {
              tooltipFormat: 'dd MMM HH:mm',
            },
            afterBuildTicks: (axis) => {
              axis.ticks = monthTickValues.map(v => ({ value: v }));
            },
            grid: { display: false },
            ticks: {
              font: { size: 12, weight: '600' },
              color: '#a0aec0',
              maxRotation: 0,
              callback: (value) => new Date(value).toLocaleDateString('en-GB', { month: 'short' }),
            },
            border: { display: false },
          },
          y: {
            min: Math.floor(Math.min(...dataPoints.map(d => Math.min(d.water, d.air))) * 2) / 2 - 0.5,
            max: Math.ceil(Math.max(...dataPoints.map(d => Math.max(d.water, d.air))) * 2) / 2 + 0.5,
            grid: {
              color: '#edf2f7',
              drawBorder: false,
            },
            ticks: {
              font: { size: 12, weight: '600' },
              color: '#a0aec0',
              callback: (val) => val.toFixed(1) + '°C',
              stepSize: 0.1,
            },
            border: { display: false },
          }
        }
      }
    });
  </script>
</body>
</html>
