  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 32px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a365d;
    }
    header p {
      font-size: 14px;
      color: #718096;
      margin-top: 4px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
      padding: 32px;
    }
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }
    .stat {
      flex: 1;
      padding: 16px 20px;
      background: #f7fafc;
      border-radius: 8px;
      border-left: 4px solid;
    }
    .stat.water { border-color: #3182ce; }
    .stat.air   { border-color: #e53e3e; }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a0aec0;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d3748;
    }
    .stat-value span {
      font-size: 16px;
      font-weight: 400;
      color: #a0aec0;
    }
    .stat-secondary {
      font-size: 16px;
      font-weight: 600;
      color: #a0aec0;
      margin-top: 2px;
    }
    .stat-hint {
      font-size: 10px;
      font-weight: 400;
      color: #cbd5e0;
      white-space: nowrap;
      float: right;
      line-height: inherit;
    }
    .stat-secondary span {
      font-size: 13px;
      font-weight: 400;
    }
    @media (max-width: 480px) {
      .stats { gap: 10px; margin-bottom: 20px; }
      .stat { padding: 10px 12px; }
      .stat-label { font-size: 9px; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .stat-value { font-size: 20px; }
      .stat-value span { font-size: 12px; }
      .stat-secondary { font-size: 13px; margin-top: 1px; white-space: nowrap; }
      .stat-secondary span { font-size: 11px; }
      .stat-hint { font-size: 9px; margin-left: 3px; white-space: nowrap; }
    }
    .chart-wrapper {
      position: relative;
      height: 380px;
    }
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #a0aec0;
    }

    /* ---------- Globe card ---------- */
    .globe-card {
      display: grid;
      place-items: center;
      padding: 40px 32px;
    }
    .globe-card h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;
      margin-bottom: 24px;
      text-align: center;
    }
    .globe-loader {
      position: relative;
      width: 260px;
      height: 260px;
    }
    .globe-loader svg { display: block; width: 100%; height: 100%; overflow: visible; }

    .whirl { position: absolute; inset: 0; pointer-events: none; }
    .whirl svg { overflow: visible; }
    .ring-dash { animation: spinCW 6.5s linear infinite; transform-origin: 50% 50%; }
    .ring-arc  { animation: spinCCW 9s linear infinite, breathe 3.2s ease-in-out infinite; transform-origin: 50% 50%; }
    @keyframes spinCW  { to { transform: rotate(360deg); } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }
    @keyframes breathe { 0%,100% { opacity: 0.55; } 50% { opacity: 0.95; } }

    /* On-globe labels */
    #cityLabels text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 7px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 2.5px;
      stroke-linejoin: round;
    }
    #cityLabels .temp-air   { fill: #e53e3e; }   /* air — HowCold red */
    #cityLabels .temp-water { fill: #3182ce; }   /* water — HowCold blue */
    #cityLabels .town {
      font-size: 6px;
      font-weight: 600;
      letter-spacing: 0.02em;
      fill: #2d3748;
      stroke: #fff;
      stroke-width: 2px;
    }
    #cityLabels line {
      stroke: #2d3748;
      stroke-width: 0.5;
      opacity: 0.5;
    }

    .globe-legend {
      margin-top: 20px;
      display: flex;
      gap: 18px;
      font-size: 11px;
      color: #718096;
      letter-spacing: 0.02em;
    }
    .globe-legend .swatch {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .globe-legend .sw-water { background: #3182ce; }
    .globe-legend .sw-air   { background: #e53e3e; }
  </style>
</head>

    const dataPoints = RAW_DATA.map(([ts, water, air]) => ({ x: new Date(ts), water, air }));

    // Stats
    const temps = dataPoints.map(d => d.water);
    const lastWater = [...dataPoints].reverse().find(d => d.water != null);

    const cutoff = new Date(dataPoints[dataPoints.length - 1].x);
    cutoff.setDate(cutoff.getDate() - 5);
    const recent = dataPoints.filter(d => d.x >= cutoff);
    const avg5d    = recent.map(d => d.water).reduce((a, b) => a + b, 0) / recent.length;
    const avg5dAir = recent.map(d => d.air).reduce((a, b) => a + b, 0) / recent.length;

    const fmtDate = (d) => {
      const datePart = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long' });
      const h = d.getHours();
      const timePart = (h % 12 || 12) + (h < 12 ? 'am' : 'pm');

        if (!acc[key]) acc[key] = d.x.getTime();
        return acc;
      }, {})
    );
    const monthTickSet = new Set(monthTickValues);

    // Saturday ticks: every Saturday (day=6) at midnight within the data range
    const saturdayTickValues = [];

    const rangeEnd   = new Date(dataPoints[dataPoints.length - 1].x);
    const sat = new Date(rangeStart); sat.setHours(0, 0, 0, 0);
    while (sat.getDay() !== 6) sat.setDate(sat.getDate() + 1);
    while (sat <= rangeEnd) {
      saturdayTickValues.push(sat.getTime());
      sat.setDate(sat.getDate() + 7);

    const allTickValues = saturdayTickValues.slice().sort((a, b) => a - b);

// Fetch live air temps for non-Lachen cities from Open-Meteo
async function fetchAirTemps(cities) {
  const targets = cities.filter(c => !c.highlight);
  if (!targets.length) return;
  const lats = targets.map(c => c.lat).join(',');
  const lons = targets.map(c => c.lon).join(',');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('open-meteo ' + r.status);
    const j = await r.json();
    const entries = Array.isArray(j) ? j : [j];
    entries.forEach((entry, i) => {
      const t = entry?.current?.temperature_2m;
      if (typeof t === 'number') targets[i].air = Math.round(t);
    });
  } catch (e) { console.warn('Air temp fetch failed:', e); }
}
fetchAirTemps(CITIES).then(() => render());

      const projection = d3.geoOrthographic()

      const sources = [
        'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',
        'https://unpkg.com/world-atlas@2/countries-110m.json',
      ];
      let topo = null;
      for (const url of sources) {
        try { const r = await fetch(url); if (r.ok) { topo = await r.json(); break; } } catch (e) {}
      }
      const countries = topo ? topojson.feature(topo, topo.objects.countries) : null;

      // Render a city name label as foreignObject so flag emoji render on iOS/Safari
      function townLabel(x, y, name, side) {
        const w = 80, h = 12;
        const fx = side === 1 ? x : x - w;
        const align = side === 1 ? 'left' : 'right';
        const style = [
          'font-family:Segoe UI,-apple-system,BlinkMacSystemFont,sans-serif',
          'font-size:6px','font-weight:600','color:#2d3748',
          'white-space:nowrap',`text-align:${align}`,
          'text-shadow:0 0 2.5px #fff,0 0 2.5px #fff,0 0 2.5px #fff',
          'letter-spacing:0.02em','line-height:1',
        ].join(';');
        return `<foreignObject x="${fx.toFixed(2)}" y="${(y - 8).toFixed(2)}" width="${w}" height="${h}"><div xmlns="http://www.w3.org/1999/xhtml" style="${style}">${name}</div></foreignObject>`;
      }

      function render() {
        if (countries) {
          let d = '';
          for (const f of countries.features) { const s = path(f); if (s) d += s + ' '; }
          gCountries.innerHTML = `<path d="${d.trim()}" />`;
        }
        gGraticule.innerHTML = `<path d="${path(graticule) || ''}" />`;

        const cx = 100, cy = 100, R = 70;
        let dots = '';
        const items = [];
        for (const c of CITIES) {
          const p = projection([c.lon, c.lat]);
          if (!p) continue;
          const side = p[0] >= cx ? 1 : -1;
          const outX = cx + side * (R + 14);
          items.push({ c, p, side, outX, outY: p[1] });
        }
        // Lachen gets a little more vertical room (two-line label)
        const gapFor = (it) => it.c.highlight ? 18 : 12;
        for (const side of [-1, 1]) {
          const group = items.filter(i => i.side === side).sort((a,b) => a.outY - b.outY);
          for (let i = 1; i < group.length; i++) {
            const need = Math.max(gapFor(group[i-1]), gapFor(group[i]));
            if (group[i].outY - group[i-1].outY < need) group[i].outY = group[i-1].outY + need;
          }
          for (const g of group) g.outY = Math.max(20, Math.min(180, g.outY));
        }

        let labels = '';
        for (const { c, p, side, outX, outY } of items) {
          // Dot (larger + ringed for the highlighted spot)
          const r = c.highlight ? 2.2 : 1.6;
          const halo = c.highlight ? 4.6 : 3.6;
          dots += `<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}" fill="${c.highlight ? '#3182ce' : '#2d3748'}" />`;
          dots += `<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${halo}" fill="none" stroke="${c.highlight ? '#3182ce' : '#2d3748'}" stroke-width="0.6" opacity="0.5" />`;

          // Leader
          const labelPadX = side === 1 ? -2 : 2;
          labels += `<line x1="${p[0].toFixed(2)}" y1="${p[1].toFixed(2)}" x2="${(outX + labelPadX).toFixed(2)}" y2="${outY.toFixed(2)}" />`;

          const anchor = side === 1 ? 'start' : 'end';
          const tempX  = side === 1 ? outX + 1 : outX - 1;

          if (c.highlight) {
            // Two-line label: "💦 13.1°  💨 11.0°" on top, town name on bottom
            const waterStr = `${c.water.toFixed(1)}°`;
            const airStr   = `${c.air.toFixed(1)}°`;
            // approximate widths for horizontal stacking
            const waterW = waterStr.length * 4.6;
            const airW   = airStr.length   * 4.6;
            const gap = 4;
            const yTop = outY - 3;
            const yBot = outY + 6;

            if (side === 1) {
              // water | air, both left-anchored
              labels += `<text class="temp-water" x="${tempX.toFixed(2)}" y="${yTop.toFixed(2)}" text-anchor="start">${waterStr}</text>`;
              labels += `<text class="temp-air"   x="${(tempX + waterW + gap).toFixed(2)}" y="${yTop.toFixed(2)}" text-anchor="start">${airStr}</text>`;
              labels += townLabel(tempX, yBot, c.name, 1);
            } else {
              // right-aligned: air | water reading right-to-left
              labels += `<text class="temp-air"   x="${tempX.toFixed(2)}" y="${yTop.toFixed(2)}" text-anchor="end">${airStr}</text>`;
              labels += `<text class="temp-water" x="${(tempX - airW - gap).toFixed(2)}" y="${yTop.toFixed(2)}" text-anchor="end">${waterStr}</text>`;
              labels += townLabel(tempX, yBot, c.name, -1);
            }
          } else {
            // Air-only cities: red temp + town name on a single line
            const tempStr = `${c.air}°`;
            const tempW = tempStr.length * 4.2;
            const gap = 3;
            const townX = side === 1 ? tempX + tempW + gap : tempX - tempW - gap;
            labels += `<text class="temp-air" x="${tempX.toFixed(2)}" y="${(outY + 2.5).toFixed(2)}" text-anchor="${anchor}">${tempStr}</text>`;
            labels += townLabel(townX, outY + 2.5, c.name, side);
          }
        }
        gCities.innerHTML = dots;
        gLabels.innerHTML = labels;
      }

      const startTime = performance.now();
      const LON_PERIOD_MS = 16000;
      const TILT = 18;
      function tick(now) {
        const t = (now - startTime) / LON_PERIOD_MS;
        const lon = (t * 360) % 360;
        const wobble = Math.sin((now - startTime) / 4200) * 4;
        projection.rotate([ -lon, -TILT + wobble, 0 ]);
        render();
        requestAnimationFrame(tick);
      }
      render();
      requestAnimationFrame(tick);
    })();
    </script>
</body>
</html>
